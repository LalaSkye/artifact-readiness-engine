name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest

    - name: Run pytest
      run: |
        pytest -v

    - name: Validate example receipts
      run: |
        artifact-readiness validate examples/pass/minimal-refusal-receipt.json
        artifact-readiness validate examples/hold/missing-receipt.json
        artifact-readiness validate examples/fail/overbroad-claim.json

    - name: Check golden inspection reports
      run: |
        python scripts/generate_reports.py --check
